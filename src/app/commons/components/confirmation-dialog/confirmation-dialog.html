<div id="confirmation_dialog" class="modal fade show d-block" tabindex="-1" (click)="closeConfirm()">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">{{ title() }}</h5>
        <button type="button"
                class="btn-close"
                (click)="closeConfirm()">
        </button>
      </div>

      <div class="modal-body">
        <p>{{ content() }}</p>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary"
                (click)="closeConfirm()">
          Cancel
        </button>

        <button class="btn btn-danger"
                (click)="confirmAction()">
          Confirm
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Backdrop -->
<div class="modal-backdrop fade show"></div>
