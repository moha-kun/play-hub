<div class="container">
  <h2>{{ 'games.tic_tac_toe.modes.multiplayer.title' | translate }}</h2>

  <tic-tac-toe-board [board]="board" (onPlay)="multiMove($event)"/>

  <div class="mt-3 d-flex flex-column align-items-center w-25">
    <div class="d-flex justify-content-between w-100">
      <button class="btn btn-danger" (click)="leaveGame()">Leave The Game</button>
      <button class="btn btn-primary" (click)="''" [disabled]="!winner">New Game!</button>
    </div>
    @if (winner) {
      <p>{{ winner === 'draw' ? ('common.outcome.draw' | translate) : ('common.outcome.win' | translate:{player: winner}) }}</p>
    }
  </div>
</div>
