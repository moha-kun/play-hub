<div class="container">
  <h2>{{ 'games.tic_tac_toe.modes.single_player.title' | translate }}</h2>

  <tic-tac-toe-board [board]="board" (onPlay)="singleMove($event)" />

  <div class="mt-3 d-flex flex-column align-items-center w-25">
    <div class="d-flex justify-content-between w-100">
      <button class="btn btn-danger" (click)="leaveGame()">Leave The Game</button>
      <button class="btn btn-primary" (click)="newGame()" [disabled]="!winner">New Game!</button>
    </div>
    @if (winner) {
      <p>{{ winner === 'draw' ? 'Draw' : (winner + ' wins!') }}</p>
    }
  </div>
</div>
